name: BowelTracker
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "15.0"

targets:
  BowelTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BowelTracker
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.BowelTracker
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: BowelTracker/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: BowelTracker/Info.plist
